<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Коллекция - Дневник путешественника</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo-container">
                <img src="images/logo.svg" alt="Логотип" class="logo-img">
                <div class="logo-text-wrapper">
                    <img src="images/header.svg" alt="ГОРИЗОНТ" class="header-title-img">
                    <span class="logo-subtitle">Дневник путешествий</span>
                </div>
            </div>
            <div class="header-right">
                <div class="search-wrapper">
                    <i class="bi bi-search search-icon"></i>
                    <input type="text" id="searchInput" class="search-input" placeholder="Поиск по названию...">
                </div>
                <button class="theme-toggle" id="themeToggle">
                    <i class="bi bi-moon"></i>
                </button>
                <div class="profile-container">
                    <button class="profile-btn" id="profileBtn">
                        <i class="bi bi-person"></i>
                    </button>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <a href="index.html" class="dropdown-item">
                            <i class="bi bi-collection"></i> Лента
                        </a>
                        <a href="collections.html" class="dropdown-item">
                            <i class="bi bi-folder"></i> Коллекции
                        </a>
                        <div class="dropdown-divider"></div>
                        <a href="#" class="dropdown-item" id="logoutBtn">
                            <i class="bi bi-box-arrow-right"></i> Выход
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <div class="content-container">
            <div class="top-row">
                <div class="top-row-left">
                    <a href="collections.html" class="back-to-feed-btn" id="backToCollectionsBtn">
                        <i class="bi bi-arrow-left"></i>
                        <span>К коллекциям</span>
                    </a>
                    <h1 class="section-title" id="collectionTitle">Загрузка...</h1>
                </div>
                <div class="filters-row">
                
                <div class="view-toggle">
                    <button class="view-btn" id="viewList" title="Список">
                        <i class="bi bi-view-stacked"></i>  
                    </button>
                    <button class="view-btn active" id="viewGrid" title="Сетка">
                        <i class="bi bi-grid"></i> 
                    </button>
                </div>
            </div>
            </div>

            

            <div id="selectedTagsContainer" class="selected-tags-container"></div>
            <div id="feedGrid" class="feed-grid"></div>
        </div>
    </div>

    <div id="postModal" class="modal-dialog" role="dialog" aria-labelledby="modalTitle" aria-modal="true" aria-hidden="true" tabindex="-1">
        <div class="modal-content-custom">
            <div class="modal-header-custom">
                <h2 id="modalTitle">Загрузка...</h2>
                <button class="modal-close-btn" onclick="closePostModal()">✕</button>
            </div>
            <div class="modal-body-custom">
                <div id="modalContent"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="script.js"></script>
    <script type="module" src="collection_detail.js"></script>
    <script type="module" src="auth.js"></script>
</body>
</html>
