<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои коллекции — Дневник путешественника</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo-container">
                <img src="images/logo.svg" alt="Логотип" class="logo-img">
                <div class="logo-text-wrapper">
                    <img src="images/header.svg" alt="ГОРИЗОНТ" class="header-title-img">
                    <span class="logo-subtitle">Дневник путешествий</span>
                </div>
            </div>
            <div class="header-right">
                <button class="theme-toggle" id="themeToggle">
                    <i class="bi bi-moon"></i>
                </button>
                <div class="profile-container">
                    <button class="profile-btn" id="profileBtn">
                        <i class="bi bi-person"></i>
                    </button>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <a href="index.html" class="dropdown-item">
                            <i class="bi bi-collection"></i> Лента
                        </a>
                        <a href="#" class="dropdown-item" id="logoutBtn">
                            <i class="bi bi-box-arrow-right"></i> Выход
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <div class="content-container">
            <div class="top-row">
                <div class="top-row-left">
                    <a href="index.html" class="back-to-feed-btn">
                        <i class="bi bi-arrow-left"></i>
                        <span>К ленте</span>
                    </a>
                    <h1 class="section-title">Мои коллекции</h1>
                </div>
                <button class="add-collection-page-btn" id="addCollectionPageBtn">
                    <i class="bi bi-plus-lg"></i> Новая коллекция
                </button>
            </div>

            <div id="collectionsList" class="collections-list"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="collections.js"></script>
    <script>
        // Если не авторизован, перенаправляем на ленту
        if (typeof isAuthenticated === 'function' && !isAuthenticated()) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
