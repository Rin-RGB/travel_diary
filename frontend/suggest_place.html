<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Предложить место — Дневник путешественника</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo-container">
                <img src="images/logo.svg" alt="Логотип" class="logo-img">
                <div class="logo-text-wrapper">
                    <img src="images/header.svg" alt="ГОРИЗОНТ" class="header-title-img">
                    <span class="logo-subtitle">Дневник путешествий</span>
                </div>
            </div>
            <div class="header-right">
                <button class="theme-toggle" id="themeToggle">
                    <i class="bi bi-moon"></i>
                </button>
                <div class="profile-container">
                    <button class="profile-btn" id="profileBtn">
                        <i class="bi bi-person"></i>
                    </button>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <a href="index.html" class="dropdown-item">
                            <i class="bi bi-collection"></i> Лента
                        </a>
                        <a href="collections.html" class="dropdown-item">
                            <i class="bi bi-folder"></i> Коллекции
                        </a>
                        <div class="dropdown-divider"></div>
                        <a href="#" class="dropdown-item" id="logoutBtn">
                            <i class="bi bi-box-arrow-right"></i> Выход
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <div class="content-container suggest-container">
            <div class="top-row">
                <div class="top-row-left">
                    <a href="index.html" class="back-to-feed-btn">
                        <i class="bi bi-arrow-left"></i>
                        <span>К ленте</span>
                    </a>
                    <h1 class="section-title">Предложить место</h1> 
                </div>
            </div>

            <form id="suggestForm" class="suggest-form">
                <div class="form-group">
                    <label for="placeTitle" class="form-label">
                        Название места <span class="required">*</span>
                    </label>
                    <input type="text" id="placeTitle" class="form-input" placeholder="Например: Музей Космонавтики" required>
                </div>

                <div class="form-group">
                    <label for="placeCity" class="form-label">
                        Город <span class="required">*</span>
                    </label>
                    <input type="text" id="placeCity" class="form-input" placeholder="Например: Москва" required>
                </div>
                <div class="form-group">
                    <label for="placeImageUrl" class="form-label">Ссылка на фото</label>
                    <input type="url" id="placeImageUrl" class="form-input" placeholder="https://example.com/photo.jpg">
                    <small style="color: var(--tag-color); font-size: 12px;">Вставьте прямую ссылку на изображение</small>
                </div>

                <div class="form-actions">
                    <button type="submit" class="submit-btn" id="submitPlaceBtn">Предложить место</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="auth.js"></script>
    <script>
        (async function() {
            if (typeof isAdmin === 'function') {
                const isAdminUser = await isAdmin();
                if (!isAdminUser) {
                    alert('Только администраторы могут предлагать места');
                    window.location.href = 'index.html';
                }
            }
        })();

        const themeToggle = document.getElementById('themeToggle');
        if (themeToggle) {
            const icon = themeToggle.querySelector('i');
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                if (icon) {
                    icon.classList.remove('bi-moon');
                    icon.classList.add('bi-sun');
                }
            }
            themeToggle.addEventListener('click', () => {
                const html = document.documentElement;
                const iconNew = themeToggle.querySelector('i');
                if (html.hasAttribute('data-theme')) {
                    html.removeAttribute('data-theme');
                    if (iconNew) {
                        iconNew.classList.remove('bi-sun');
                        iconNew.classList.add('bi-moon');
                    }
                    localStorage.setItem('theme', 'light');
                } else {
                    html.setAttribute('data-theme', 'dark');
                    if (iconNew) {
                        iconNew.classList.remove('bi-moon');
                        iconNew.classList.add('bi-sun');
                    }
                    localStorage.setItem('theme', 'dark');
                }
            });
        }

        const profileBtn = document.getElementById('profileBtn');
        const dropdown = document.getElementById('dropdownMenu');
        if (profileBtn && dropdown) {
            profileBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                dropdown.classList.toggle('show');
            });
            document.addEventListener('click', (e) => {
                if (!profileBtn.contains(e.target) && !dropdown.contains(e.target)) {
                    dropdown.classList.remove('show');
                }
            });
        }

        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', (e) => {
                e.preventDefault();
                if (confirm('Вы уверены, что хотите выйти?')) {
                    localStorage.removeItem('access_token');
                    localStorage.removeItem('refresh_token');
                    localStorage.removeItem('currentUser');
                    window.location.href = 'index.html';
                }
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('suggestForm');
            if (form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const title = document.getElementById('placeTitle').value.trim();
                    const city = document.getElementById('placeCity').value.trim();
                    const description = document.getElementById('placeDescription').value.trim();
                    const imageUrl = document.getElementById('placeImageUrl').value.trim();
                    
                    if (!title || !city) {
                        alert('Пожалуйста, заполните обязательные поля (название и город)');
                        return;
                    }
                    
                    const newPost = {
                        id: Date.now(),
                        name: title,
                        title: title,
                        city: city,
                        description: description || 'Новое место',
                        cover_photo: imageUrl || 'https://via.placeholder.com/400x200?text=Нет+фото',
                        image: imageUrl || 'https://via.placeholder.com/400x200?text=Нет+фото',
                        date: new Date().toLocaleDateString('ru-RU'),
                        tags: []
                    };
                    
                    if (window.feedPosts) {
                        window.feedPosts.unshift(newPost);
                        localStorage.setItem('feedPosts', JSON.stringify(window.feedPosts));
                        alert('Отпралено!');
                        form.reset();
                    } else {
                        window.feedPosts = [newPost];
                        localStorage.setItem('feedPosts', JSON.stringify(window.feedPosts));
                        alert('Отправлено!');
                        form.reset();
                    }
                });
            }
        });
    </script>
</body>
</html>
