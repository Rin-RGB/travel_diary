<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Предложить место — Дневник путешественника</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="container">
        <!-- Шапка с логотипом, названием и иконками -->
        <header class="header">
            <div class="logo-container">
                <img src="images/logo.svg" alt="Логотип" class="logo-img">
                <div class="logo-text-wrapper">
                    <img src="images/header.svg" alt="ГОРИЗОНТ" class="header-title-img">
                    <span class="logo-subtitle">Дневник путешествий</span>
                </div>
            </div>
            <div class="header-right">
                <button class="theme-toggle" id="themeToggle">
                    <i class="bi bi-moon"></i>
                </button>
                <div class="profile-container">
                    <button class="profile-btn" id="profileBtn">
                        <i class="bi bi-person"></i>
                    </button>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <a href="index.html" class="dropdown-item">
                            <i class="bi bi-collection"></i> Лента
                        </a>
                        <a href="collections.html" class="dropdown-item">
                            <i class="bi bi-folder"></i> Коллекции
                        </a>
                        <a href="settings.html" class="dropdown-item">
                            <i class="bi bi-gear"></i> Настройки
                        </a>
                        <div class="dropdown-divider"></div>
                        <a href="#" class="dropdown-item" id="logoutBtn">
                            <i class="bi bi-box-arrow-right"></i> Выход
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <!-- Основной контейнер с формой -->
        <div class="content-container suggest-container">
            <div class="top-row">
                <div class="top-row-left">
                    <a href="index.html" class="back-to-feed-btn">
                        <i class="bi bi-arrow-left"></i>
                        <span>К ленте</span>
                    </a>
                    <h1 class="section-title">Предложить место</h1> 
                </div>
            </div>

            <form id="suggestForm" class="suggest-form">
                <!-- Название -->
                <div class="form-group">
                    <label for="placeTitle" class="form-label">
                        Название места <span class="required">*</span>
                    </label>
                    <input type="text" id="placeTitle" class="form-input" placeholder="Например: Музей Космонавтики" required>
                </div>

                <!-- Город -->
                <div class="form-group">
                    <label for="placeCity" class="form-label">
                        Город <span class="required">*</span>
                    </label>
                    <input type="text" id="placeCity" class="form-input" placeholder="Например: Москва" required>
                </div>

                <!-- Описание -->
                <div class="form-group">
                    <label for="placeDescription" class="form-label">Описание</label>
                    <textarea id="placeDescription" class="form-textarea" rows="4" placeholder="Расскажите о месте... (необязательно)"></textarea>
                </div>

                <!-- Фотография -->
                <div class="form-group">
                    <label for="placeImage" class="form-label">Фотография</label>
                    <div class="file-upload">
                        <input type="file" id="placeImage" class="file-input" accept="image/*">
                        <label for="placeImage" class="file-label">
                            <i class="bi bi-cloud-upload"></i>
                            <span>Выберите файл или перетащите</span>
                        </label>
                        <div class="file-name" id="fileName">Файл не выбран</div>
                    </div>
                </div>

                <!-- Кнопка отправки -->
                <div class="form-actions">
                    <button type="submit" class="submit-btn" id="submitPlaceBtn">Предложить место</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const fileInput = document.getElementById('placeImage');
            const fileName = document.getElementById('fileName');
            
            if (fileInput) {
                fileInput.addEventListener('change', function() {
                    if (this.files && this.files[0]) {
                        fileName.textContent = this.files[0].name;
                    } else {
                        fileName.textContent = 'Файл не выбран';
                    }
                });
            }

            // Обработка отправки формы
            const form = document.getElementById('suggestForm');
            if (form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const title = document.getElementById('placeTitle').value.trim();
                    const city = document.getElementById('placeCity').value.trim();
                    
                    if (!title || !city) {
                        alert('Пожалуйста, заполните обязательные поля (название и город)');
                        return;
                    }

                    alert('Спасибо! Ваше предложение отправлено на рассмотрение модераторам сайта.');

                    form.reset();
                    fileName.textContent = 'Файл не выбран';
                });
            }
        });
    </script>
</body>
</html>
