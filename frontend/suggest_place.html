<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Предложить место — Дневник путешественника</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="logo-container">
                <img src="images/logo.svg" alt="Логотип" class="logo-img">
                <div class="logo-text-wrapper">
                    <img src="images/header.svg" alt="ГОРИЗОНТ" class="header-title-img">
                    <span class="logo-subtitle">Дневник путешествий</span>
                </div>
            </div>
            <div class="header-right">
                <button class="theme-toggle" id="themeToggle">
                    <i class="bi bi-moon"></i>
                </button>
                <div class="profile-container">
                    <button class="profile-btn" id="profileBtn">
                        <i class="bi bi-person"></i>
                    </button>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <a href="index.html" class="dropdown-item">
                            <i class="bi bi-collection"></i> Лента
                        </a>
                        <a href="collections.html" class="dropdown-item">
                            <i class="bi bi-folder"></i> Коллекции
                        </a>
                        <div class="dropdown-divider"></div>
                        <a href="#" class="dropdown-item" id="logoutBtn">
                            <i class="bi bi-box-arrow-right"></i> Выход
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <div class="content-container suggest-container">
            <div class="top-row">
                <div class="top-row-left">
                    <a href="index.html" class="back-to-feed-btn">
                        <i class="bi bi-arrow-left"></i>
                        <span>К ленте</span>
                    </a>
                    <h1 class="section-title">Добавить место</h1>
                </div>
            </div>

            <form id="suggestForm" class="suggest-form">
                <div class="form-group">
                    <label for="placeTitle" class="form-label">
                        Название места <span class="required">*</span>
                    </label>
                    <input type="text" id="placeTitle" class="form-input" required>
                </div>

                <div class="form-group">
                    <label for="placeCity" class="form-label">
                        Город <span class="required">*</span>
                    </label>
                    <select id="placeCity" class="form-input" required>
                        <option value="">Загрузка городов...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="placeAddress" class="form-label">Адрес</label>
                    <input type="text" id="placeAddress" class="form-input">
                </div>

                <div class="form-group">
                    <label for="placeDescription" class="form-label">Описание</label>
                    <textarea id="placeDescription" class="form-textarea" rows="4"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Теги</label>
                    <div id="tagsContainer" class="tags-checkboxes"></div>
                </div>

                <div class="form-group">
                    <label for="placeImageUrl" class="form-label">Ссылка на фото</label>
                    <input type="url" id="placeImageUrl" class="form-input" placeholder="https://example.com/photo.jpg">
                </div>

                <div class="form-actions">
                    <button type="submit" class="submit-btn">Добавить место</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module">
        import apiService from './apiService.js';
        import api from './index.js';

        async function checkAdmin() {
            const token = localStorage.getItem('access_token');
            if (!token) {
                alert('Необходима авторизация');
                window.location.href = 'index.html';
                return false;
            }

            try {
                const userData = await api.currentUserData();
                const role = typeof userData.role === 'object' ? userData.role.role : userData.role;
                if (role !== 'admin') {
                    alert('Доступ только для администраторов');
                    window.location.href = 'index.html';
                    return false;
                }
                return true;
            } catch (error) {
                alert('Ошибка проверки прав');
                window.location.href = 'index.html';
                return false;
            }
        }

        async function loadCities() {
            try {
                const cities = await api.getCities();
                const select = document.getElementById('placeCity');
                select.innerHTML = '<option value="">Выберите город</option>';
                cities.forEach(city => {
                    select.innerHTML += `<option value="${city.id}">${city.city}</option>`;
                });
            } catch (error) {
                console.error('Error loading cities:', error);
                document.getElementById('placeCity').innerHTML = '<option value="">Ошибка загрузки городов</option>';
            }
        }
        async function loadTags() {
            try {
                const tags = await api.checkTags();
                const container = document.getElementById('tagsContainer');
                if (!container) return;

                container.innerHTML = tags.map(tag => `
            <label class="tag-checkbox-item">
                <input type="checkbox" value="${tag.id}">
                <span>#${tag.name}</span>
            </label>
        `).join('');
            } catch (error) {
                console.error('Error loading tags:', error);
            }
        }

        function getSelectedTags() {
            const checkboxes = document.querySelectorAll('#tagsContainer input:checked');
            return Array.from(checkboxes).map(cb => cb.value);
        }

        function initTheme() {
            const themeToggle = document.getElementById('themeToggle');
            if (!themeToggle) return;
            const icon = themeToggle.querySelector('i');
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                if (icon) icon.classList.replace('bi-moon', 'bi-sun');
            }
            themeToggle.addEventListener('click', () => {
                const html = document.documentElement;
                const iconNew = themeToggle.querySelector('i');
                if (html.hasAttribute('data-theme')) {
                    html.removeAttribute('data-theme');
                    iconNew.classList.replace('bi-sun', 'bi-moon');
                    localStorage.setItem('theme', 'light');
                } else {
                    html.setAttribute('data-theme', 'dark');
                    iconNew.classList.replace('bi-moon', 'bi-sun');
                    localStorage.setItem('theme', 'dark');
                }
            });
        }

        function initDropdown() {
            const profileBtn = document.getElementById('profileBtn');
            const dropdown = document.getElementById('dropdownMenu');
            if (!profileBtn || !dropdown) return;
            profileBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                dropdown.classList.toggle('show');
            });
            document.addEventListener('click', () => dropdown.classList.remove('show'));
        }

        function initLogout() {
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (confirm('Выйти?')) {
                        localStorage.removeItem('access_token');
                        localStorage.removeItem('refresh_token');
                        localStorage.removeItem('currentUser');
                        window.location.href = 'index.html';
                    }
                });
            }
        }

        async function createPlace(event) {
            event.preventDefault();

            const name = document.getElementById('placeTitle').value.trim();
            const cityId = document.getElementById('placeCity').value;
            const address = document.getElementById('placeAddress').value.trim();
            const description = document.getElementById('placeDescription').value.trim();
            const photoUrl = document.getElementById('placeImageUrl').value.trim();

            if (!name) {
                alert('Введите название места');
                return;
            }
            if (!cityId) {
                alert('Выберите город');
                return;
            }

            const placeData = {
                name: name,
                city_id: cityId,
                address: address,
                description: description,
                photo_urls: photoUrl ? [photoUrl] : [],
                tags: []
            };

            try {
                const result = await apiService.createPlace(placeData);
                if (result.success) {
                    alert('Место успешно добавлено!');
                    document.getElementById('suggestForm').reset();
                    window.location.href = 'index.html';
                } else {
                    alert('Ошибка: ' + result.error);
                }
            } catch (error) {
                alert('Ошибка: ' + (error.response?.data?.detail || 'Неизвестная ошибка'));
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const isAdmin = await checkAdmin();
            if (!isAdmin) return;

            await loadCities();
            await loadTags();
            initTheme();
            initDropdown();
            initLogout();

            const form = document.getElementById('suggestForm');
            form.addEventListener('submit', createPlace);
        });
    </script>
</body>

</html>
