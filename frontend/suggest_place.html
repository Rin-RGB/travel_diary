<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Предложить место — Дневник путешественника</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo-container">
                <img src="images/logo.svg" alt="Логотип" class="logo-img">
                <div class="logo-text-wrapper">
                    <img src="images/header.svg" alt="ГОРИЗОНТ" class="header-title-img">
                    <span class="logo-subtitle">Дневник путешествий</span>
                </div>
            </div>
            <div class="header-right">
                <button class="theme-toggle" id="themeToggle">
                    <i class="bi bi-moon"></i>
                </button>
                <div class="profile-container">
                    <button class="profile-btn" id="profileBtn">
                        <i class="bi bi-person"></i>
                    </button>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <a href="index.html" class="dropdown-item">
                            <i class="bi bi-collection"></i> Лента
                        </a>
                        <a href="collections.html" class="dropdown-item">
                            <i class="bi bi-folder"></i> Коллекции
                        </a>
                        <div class="dropdown-divider"></div>
                        <a href="#" class="dropdown-item" id="logoutBtn">
                            <i class="bi bi-box-arrow-right"></i> Выход
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <div class="content-container suggest-container">
            <div class="top-row">
                <div class="top-row-left">
                    <a href="index.html" class="back-to-feed-btn">
                        <i class="bi bi-arrow-left"></i>
                        <span>К ленте</span>
                    </a>
                    <h1 class="section-title">Добавить место</h1> 
                </div>
            </div>

            <form id="suggestForm" class="suggest-form">
                <div class="form-group">
                    <label for="placeTitle" class="form-label">
                        Название места <span class="required">*</span>
                    </label>
                    <input type="text" id="placeTitle" class="form-input" placeholder="Например: Музей Космонавтики" required>
                </div>

                <div class="form-group">
                    <label for="placeCity" class="form-label">
                        Город <span class="required">*</span>
                    </label>
                    <select id="placeCity" class="form-input" required>
                        <option value="">Выберите город</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="placeAddress" class="form-label">Адрес</label>
                    <input type="text" id="placeAddress" class="form-input" placeholder="Улица, дом">
                </div>

                <div class="form-group">
                    <label for="placeDescription" class="form-label">Описание</label>
                    <textarea id="placeDescription" class="form-textarea" rows="4" placeholder="Расскажите о месте..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Теги</label>
                    <div id="tagsContainer" class="tags-checkboxes"></div>
                </div>

                <div class="form-group">
                    <label for="placeImage" class="form-label">Фотография (URL)</label>
                    <input type="url" id="placeImage" class="form-input" placeholder="https://example.com/photo.jpg">
                </div>

                <div class="form-actions">
                    <button type="submit" class="submit-btn" id="submitPlaceBtn">Создать место</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="auth.js"></script>
    <script type="module" src="suggest_place.js"></script>
</body>
</html>
