<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки - Дневник путешествий</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="container">
        <!-- Шапка с логотипом, названием и иконками -->
        <header class="header">
            <div class="logo-container">
                <img src="images/logo.svg" alt="Логотип" class="logo-img">
                <div class="logo-text-wrapper">
                    <img src="images/header.svg" alt="ГОРИЗОНТ" class="header-title-img">
                    <span class="logo-subtitle">Дневник путешествий</span>
                </div>
            </div>
            <div class="header-right">
                <button class="theme-toggle" id="themeToggle">
                    <i class="bi bi-moon"></i>
                </button>
                <div class="profile-container">
                    <button class="profile-btn" id="profileBtn">
                        <i class="bi bi-person"></i>
                    </button>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <a href="index.html" class="dropdown-item">
                            <i class="bi bi-collection"></i> Лента
                        </a>
                        <a href="collections.html" class="dropdown-item">
                            <i class="bi bi-folder"></i> Коллекции
                        </a>
                        <div class="dropdown-divider"></div>
                        <a href="#" class="dropdown-item" id="logoutBtn">
                            <i class="bi bi-box-arrow-right"></i> Выход
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <div class="content-container">
            <div class="top-row">
                <div class="top-row-left">
                    <a href="index.html" class="back-to-feed-btn">
                        <i class="bi bi-arrow-left"></i>
                        <span>К ленте</span>
                    </a>
                    <h1 class="section-title">Настройки</h1> 
                </div>
            </div>

            <!-- Контент страницы -->
            <div style="display: flex; align-items: center; justify-content: center; min-height: 300px;">
                <p style="color: var(--text-color); opacity: 0.7; font-size: 18px;">
                    Страница настроек находится в разработке
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
